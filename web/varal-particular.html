<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Varal Particular - My Clothesline</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/globals.css">
    <link rel="stylesheet" href="assets/css/varal-particular.css">
</head>
<body>
    <div class="varal-container">
        <!-- Cabeçalho da Página -->
        <header class="varal-header">
            <div class="logo-section">
                <i data-lucide="waves" class="logo-icon"></i>
                <div class="title-group">
                    <h1>Varal Particular</h1>
                    <h2 id="display-nome-varal">Personalize seu espaço</h2>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-leave" onclick="sairDoVaral()">
                    <i data-lucide="log-out"></i>
                    Sair do Grupo
                </button>
                <button class="btn-close" onclick="window.close()">
                    <i data-lucide="x"></i>
                    Fechar
                </button>
            </div>
        </header>

        <div class="varal-content-wrapper">
            <!-- As setas foram removidas para dar lugar ao scroll nativo pelo mouse -->

            <!-- Área Principal do Varal -->
            <main class="varal-main">
                <div id="varal-display" class="varal-canvas horizontal-flow">
                    <!-- Posts e Mensagens serão pendurados aqui em linha -->
                </div>
            </main>

            <!-- Sidebar de Pessoas (Lado Direito) -->
            <aside id="sidebar-pessoas" class="pessoas-sidebar">
                <button id="btnSidebarUp" class="sidebar-nav-btn up" onclick="scrollSidebar(-200)">
                    <i data-lucide="chevron-up"></i>
                </button>

                <div class="sidebar-title">Pessoas</div>
                <div id="lista-pessoas-quadrada" class="pessoas-grid">
                    <!-- Botões quadrados das pessoas aparecerão aqui -->
                </div>

                <button id="btnSidebarDown" class="sidebar-nav-btn down" onclick="scrollSidebar(200)">
                    <i data-lucide="chevron-down"></i>
                </button>
            </aside>
        </div>

        <!-- Barra de Ferramentas (Bottom Bar) -->
        <footer class="varal-toolbar">
            <!-- Seção de Nomeação (Aparece apenas quando não há nome) -->
            <div id="naming-bar" class="toolbar-overlay naming-active hidden">
                <div class="varal-naming-section">
                    <input type="text" id="nome-varal" placeholder="Como se chamará seu varal?" aria-label="Nome do Varal">
                    <button class="btn-save-name" onclick="salvarNomeVaral()" title="Criar Varal">
                        <i data-lucide="play"></i> Criar Varal
                    </button>
                </div>
            </div>

            <div class="toolbar-group">
                <button class="toolbar-btn btn-pendurar" onclick="document.getElementById('input-pendurar').click()">
                    <i data-lucide="upload-cloud"></i>
                    <span>Pendurar</span>
                </button>
                <input type="file" id="input-pendurar" hidden accept="image/*,video/*" onchange="pendurarArquivo(this)">
                
                <div class="toolbar-separator"></div>

                <button class="toolbar-btn btn-incluir" onclick="abrirModalBusca()">
                    <i data-lucide="user-plus"></i>
                    <span>Incluir</span>
                </button>
            </div>
            
            <div class="toolbar-separator"></div>

            <div class="toolbar-group">
                <button class="toolbar-btn btn-mensagem" onclick="acaoMensagem()">
                    <i data-lucide="message-square"></i>
                    <span>Mensagem</span>
                </button>
            </div>
        </footer>
    </div>

    <!-- MODAL DE BUSCA (TELINHA) -->
    <div id="modal-busca-pessoa" class="modal-full hidden">
        <div class="modal-busca-content">
            <div class="modal-busca-header">
                <h3>Incluir no Varal</h3>
                <button class="btn-close-modal" onclick="fecharModalBusca()"><i data-lucide="x"></i></button>
            </div>
            <div class="search-input-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="input-busca-modal" placeholder="Quem você deseja incluir?" oninput="buscarSugestoes(this.value)">
            </div>
            <div id="suggestions-list-modal" class="suggestions-grid-modal">
                <!-- Sugestões aparecerão aqui -->
            </div>
        </div>
    </div>

    <!-- MODAL ESCREVER MENSAGEM (PREMIUM) -->
    <div id="modal-escrever-mensagem" class="modal-full hidden">
        <div class="modal-busca-content" style="max-width: 500px;">
            <div class="modal-busca-header">
                <h3 style="display: flex; align-items: center; gap: 10px; color: #f59e0b;">
                    <i data-lucide="message-square"></i> Deixar uma Mensagem
                </h3>
                <button class="btn-close-modal" onclick="fecharModalMensagem()"><i data-lucide="x"></i></button>
            </div>
            <div style="padding: 20px 0;">
                <textarea id="texto-mensagem-varal" placeholder="Escreva algo especial para este varal..." 
                          style="width: 100%; height: 150px; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; font-family: 'Outfit'; font-size: 16px; outline: none; resize: none;"></textarea>
            </div>
            <button class="btn-save-name" onclick="enviarMensagemModal()" style="width: 100%; height: 50px; background: #f59e0b; border-radius: 15px; font-size: 16px; color: white; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i data-lucide="send"></i> Pendurar Mensagem
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/shared-logic.js"></script>
    <script src="assets/js/varal-particular.js"></script>
    <!-- MODAL CINEMA (ZOOM) -->
    <div id="modalZoom" class="modal" onclick="fecharZoom()" style="background:rgba(0,0,0,0.9);">
        <div style="position:relative; max-width:90vw; max-height:90vh;" onclick="event.stopPropagation()">
            <img id="imgZoom" src="" style="max-width:100%; max-height:90vh; display:none; border-radius:10px;">
            <video id="videoZoom" src="" controls style="max-width:100%; max-height:90vh; display:none; border-radius:10px;"></video>
            <button onclick="fecharZoom()" style="position:absolute; top:-40px; right:0; background:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer; font-weight:800; font-family:'Outfit';">Fechar (Esc)</button>
        </div>
    </div>

    <script>
        // Inicializa ícones Lucide
        lucide.createIcons();
    </script>
</body>
</html>
